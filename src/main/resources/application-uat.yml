spring:
  application:
    name: MHArmorVault-Backend
  datasource:
    url: jdbc:postgresql://ep-weathered-field-a1f68e9a.ap-southeast-1.aws.neon.tech:5432/MHDB
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update # 關鍵設定
    show-sql: true     # 建議開啟，這樣你能在 Console 看到它執行了 CREATE TABLE
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
gemini:
  api:
    key: ${GEMINI_API_KEY:}